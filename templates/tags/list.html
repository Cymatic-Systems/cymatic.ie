{% extends "base.html" %}
{% import "macros/components.html" as components %}

{% block content %}
<section class="flex flex-col w-full px-4 py-8 light">
  <div class="flex max-w-screen-xl w-full m-auto pt-4 mb-8">
    <h1 id="tags"
      class="pl-4 border-l-2 border-[#33B7BF] text-[#33B7BF] font-outfit font-bold text-3xl md:text-4xl tracking-tight">
      Tags
    </h1>
  </div>
  <div class="flex flex-col max-w-screen-xl w-full m-auto align-content-center p-2 md:p-0">
    <ul>
        {% for tag in terms %}
        <li>
            <h2 class="post-header__title"><a href="{{ config.base_url }}/tags/{{ tag.slug }}">{{ tag.name }}</a></h2>
            <p class="post-header__info">
                {{ tag.pages | length }} post{{ tag.pages | length | pluralize }}
            </p>
        </li>
        {% endfor %}
    </ul>
  </div>
</section>
{% endblock content %}
