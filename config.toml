# The URL the site will be built for
base_url = "https://cymatic.ie"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

# RSS Feed
generate_feeds = true
feed_filenames = ["rss.xml"]

taxonomies = [
    {name = "tags", feed = true}
]

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true

[extra]
# Put all your custom variables here
title = "Cymatic Systems"
title_default_tag = "Cloud, DevOps & Game Server Engineering in Dublin"
description = "Dublin-based software engineering consultancy. Cloud infrastructure, Kubernetes, game server development, distributed systems, and backend engineering for teams that need production-grade systems."
logo = "cymatic-logo.svg"

[extra.authors.declan]
name = "Declan Curran"
github = "dcrn"
linkedin = "dcrn"
bio = "Managing Director and Principal Architect specializing in high-performance cloud infrastructure and distributed systems."
avatar = "img/authors/declan.jpg"
