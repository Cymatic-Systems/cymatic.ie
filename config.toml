# The URL the site will be built for
base_url = "https://cymatic.ie"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

# RSS Feed
generate_feeds = true
feed_filenames = ["rss.xml"]

taxonomies = [
    {name = "tags", feed = true}
]

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true

[extra]
# Put all your custom variables here
title = "Cymatic Systems"
title_default_tag = "Cloud, DevOps & Game Server Engineering in Dublin"
description = "Dublin-based consultancy specialising in cloud-native Rust, Java, and Kotlin engineering. High-throughput data pipelines, custom Kubernetes operators, game server backends, and infrastructure where correctness and performance matter."
logo = "cymatic-logo.svg"

[extra.authors.declan]
name = "Declan Curran"
github = "dcrn"
linkedin = "dcrn"
bio = "Cloud architect and software engineer shipping Rust and Java across data platforms, game backends, and cloud infrastructure for over a decade. Founded Cymatic Systems to bring senior engineering depth to teams solving hard problems."
avatar = "img/authors/declan.jpg"
